spring.application.name=eduhub-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/eduhub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=change-this-secret-key-in-production-min-32-chars
jwt.expiration-ms=86400000

springdoc.swagger-ui.path=/swagger-ui.html